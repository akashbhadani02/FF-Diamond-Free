io<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Reward Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#090909,#121d35,#000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

.container{
width:350px;
background:rgba(20,20,30,.95);
padding:25px;
border-radius:20px;
box-shadow:0 0 30px #00ffe5;
text-align:center;
border:2px solid #00ffe5;
}

h1{
font-size:24px;
color:#00ffe5;
margin-bottom:15px;
}

.subtitle{
color:#bbb;
font-size:14px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#1f1f2e;
color:white;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
background:linear-gradient(90deg,#00ffe5,#00a8ff);
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:black;
transition:.3s;
}

button:hover{
transform:scale(1.04);
}

.progressBox{
display:none;
margin-top:18px;
}

.progress{
height:14px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffe5,#00ff6a);
transition:.4s;
}

.status{
margin-top:10px;
color:#00ffe5;
font-size:14px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
border:2px solid #00ff99;
box-shadow:0 0 35px #00ff99;
width:320px;
animation:pop .4s ease;
}

@keyframes pop{
from{
transform:translate(-50%,-50%) scale(.6);
opacity:0;
}
to{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}

.success{
font-size:28px;
color:#00ff99;
margin-bottom:10px;
}

.warning{
margin-top:15px;
font-size:12px;
color:#ff9090;
}
</style>
</head>
<body>

<div class="container">

<h1>GAMING REWARD HUB</h1>
<div class="subtitle">Special Event Reward System</div>

<input type="text" id="uid" placeholder="Enter Player UID">

<select id="diamond">
<option>500 Rewards</option>
<option>1000 Rewards</option>
<option>5000 Rewards</option>
<option>9999999 Rewards</option>
<option>999999999 Rewards</option>
</select>

<button onclick="startPrank()">GENERATE</button>

<div class="progressBox" id="progressBox">

<div class="status" id="status">
Connecting to secure server...
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

</div>

<div class="popup" id="popup">

<div class="success">✔ SUCCESS!</div>

<p id="resultText"></p>

<div class="warning">
You will get in 3 to 7 working days
</div>

</div>

<script>

function startPrank(){

let uid=document.getElementById("uid").value;
let diamond=document.getElementById("diamond").value;

if(uid==""){
alert("Enter UID first!");
return;
}

let progressBox=document.getElementById("progressBox");
let bar=document.getElementById("bar");
let status=document.getElementById("status");

progressBox.style.display="block";

let progress=0;

let steps=[
"Connecting to secure server...",
"Checking UID database...",
"Verifying player account...",
"Encrypting reward packet...",
"Finalizing delivery..."
];

let interval=setInterval(()=>{

progress+=20;
bar.style.width=progress+"%";

status.innerText=
steps[Math.floor(progress/100)-1] || "Processing...";

if(progress>=100000000000){

clearInterval(interval);

setTimeout(()=>{

document.getElementById("popup").style.display="block";

document.getElementById("resultText").innerHTML=
diamond+" successfully sent to UID <br><b>"+uid+"</b>";

},700);

}

},900);

}

</script>

</body>
</html>
